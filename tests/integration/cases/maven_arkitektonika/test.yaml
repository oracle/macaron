description: |
  Analyzing a Maven artifact to verify that mcn_registry_maintainability_1 passes
  for an actively maintained package. Arkitektonika-Client@2.1.3 is an old pinned
  version, but the package continues to receive releases on Maven Central, so the
  check should correctly report it as maintained using the latest release date.

tags:
- macaron-python-package

steps:
- name: Run macaron analyze on Arkitektonika-Client
  kind: analyze
  options:
    command_args:
    - -purl
    - pkg:maven/com.intellectualsites.arkitektonika/Arkitektonika-Client@2.1.3
- name: Run macaron verify-policy to check that maintainability passes
  kind: verify
  options:
    policy: policy.dl
