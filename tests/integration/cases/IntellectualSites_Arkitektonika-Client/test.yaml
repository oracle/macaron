description: |
  Analyzing repository authenticity of an artifact that uses Gradle as build tool.
  Also verifies that the registry maintainability check passes for both the versioned
  and unversioned PURLs of Arkitektonika-Client.

tags:
- macaron-python-package

steps:
- name: Run macaron analyze
  kind: analyze
  options:
    command_args:
    - -purl
    - pkg:maven/com.intellectualsites.arkitektonika/Arkitektonika-Client@2.1.3
- name: Run macaron verify-policy to verify passed/failed checks
  kind: verify
  options:
    policy: policy.dl
- name: Run macaron analyze on the unversioned PURL
  kind: analyze
  options:
    command_args:
    - -purl
    - pkg:maven/com.intellectualsites.arkitektonika/Arkitektonika-Client
- name: Run macaron verify-policy to verify the registry maintainability check passes without a version
  kind: verify
  options:
    policy: policy.dl
