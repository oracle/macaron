description: |
  Analyzing a yanked PyPI package to verify that mcn_registry_maintainability_1 fails
  when a package version has been explicitly yanked from the registry.

tags:
- macaron-python-package

steps:
- name: Run macaron analyze on yanked aiohttp version.
  kind: analyze
  options:
    command_args:
    - -purl
    - pkg:pypi/aiohttp@3.9.3
- name: Run macaron verify-policy to check maintainability fails.
  kind: verify
  options:
    policy: policy.dl
  expect_fail: true
- name: Compare verify policy result.
  kind: compare
  options:
    kind: policy_report
    result: output/policy_report.json
    expected: policy_report.json
