description: |
  Analyzing PyPI package aiohttp to verify that mcn_registry_maintainability_1 passes
  for an actively maintained package. Although this version is old, aiohttp continues to
  receive regular releases, so the check correctly reports the package as maintained.

tags:
- macaron-python-package

steps:
- name: Run macaron analyze on yanked aiohttp version.
  kind: analyze
  options:
    command_args:
    - -purl
    - pkg:pypi/aiohttp@3.9.3
- name: Run macaron verify-policy to check maintainability passes.
  kind: verify
  options:
    policy: policy.dl
- name: Compare verify policy result.
  kind: compare
  options:
    kind: policy_report
    result: output/policy_report.json
    expected: policy_report.json
