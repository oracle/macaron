description: |
  Test buildspec generation for a non-pure wheel that bundles Ruff.

tags:
- macaron-python-package

steps:
- name: Run macaron analyze
  kind: analyze
  options:
    command_args:
    - -purl
    - pkg:pypi/ruff@0.15.13
- name: Generate the buildspec
  kind: gen-build-spec
  options:
    command_args:
    - -purl
    - pkg:pypi/ruff@0.15.13
- name: Compare Buildspec.
  kind: compare
  options:
    kind: default_build_spec
    result: output/buildspec/pypi/ruff/macaron.buildspec
    expected: expected_default.buildspec
- name: Generate the buildspec
  kind: gen-build-spec
  options:
    command_args:
    - -purl
    - pkg:pypi/ruff@0.15.13
    - --output-format
    - dockerfile
- name: Compare Dockerfile
  kind: compare
  options:
    kind: dockerfile_build_spec
    result: output/buildspec/pypi/ruff/dockerfile.buildspec
    expected: expected_dockerfile.buildspec
